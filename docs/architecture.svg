<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>trader-ai architecture</title>
<desc>A three-tier architecture diagram showing data sources on top, the bot core in the middle, and the operations and interface layers on the bottom.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font-family: sans-serif; font-size: 14px; font-weight: 400; }
    .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; }
    .th { font-family: sans-serif; font-size: 14px; font-weight: 500; }
    .mono { font-family: ui-monospace, monospace; font-size: 11px; }
    .t, .ts, .th, .mono { fill: #444441; }
    @media (prefers-color-scheme: dark) {
      .t, .ts, .th, .mono { fill: #D3D1C7; }
    }
    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th    { fill: #085041; }
    .c-teal .ts    { fill: #0F6E56; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th   { fill: #633806; }
    .c-amber .ts   { fill: #854F0B; }
    .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th    { fill: #444441; }
    .c-gray .ts    { fill: #5F5E5A; }
    @media (prefers-color-scheme: dark) {
      .c-teal rect   { fill: #085041; stroke: #9FE1CB; }
      .c-teal .th    { fill: #E1F5EE; }
      .c-teal .ts    { fill: #9FE1CB; }
      .c-purple rect { fill: #3C3489; stroke: #CECBF6; }
      .c-purple .th  { fill: #EEEDFE; }
      .c-purple .ts  { fill: #CECBF6; }
      .c-amber rect  { fill: #633806; stroke: #FAC775; }
      .c-amber .th   { fill: #FAEEDA; }
      .c-amber .ts   { fill: #FAC775; }
      .c-gray rect   { fill: #444441; stroke: #D3D1C7; }
      .c-gray .th    { fill: #F1EFE8; }
      .c-gray .ts    { fill: #D3D1C7; }
    }
    .arr { stroke: #888780; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) { .arr { stroke: #B4B2A9; } }
    .tier-label { fill: #888780; font-family: sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    @media (prefers-color-scheme: dark) { .tier-label { fill: #888780; } }
  </style>
</defs>

<!-- Tier 1: data sources -->
<text class="tier-label" x="40" y="28">Data sources</text>

<g class="c-teal">
  <rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="64" text-anchor="middle" dominant-baseline="central">Binance</text>
  <text class="ts" x="110" y="82" text-anchor="middle" dominant-baseline="central">BTC price, 5m klines</text>
</g>

<g class="c-teal">
  <rect x="200" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="64" text-anchor="middle" dominant-baseline="central">Polymarket CLOB</text>
  <text class="ts" x="270" y="82" text-anchor="middle" dominant-baseline="central">Featured markets</text>
</g>

<g class="c-teal">
  <rect x="360" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="64" text-anchor="middle" dominant-baseline="central">Polymarket Gamma</text>
  <text class="ts" x="430" y="82" text-anchor="middle" dominant-baseline="central">Short-term markets</text>
</g>

<g class="c-gray">
  <rect x="520" y="40" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="64" text-anchor="middle" dominant-baseline="central">TV Desktop</text>
  <text class="ts" x="580" y="82" text-anchor="middle" dominant-baseline="central">via CDP 9222</text>
</g>

<!-- Arrows down into bot core -->
<line x1="110" y1="96"  x2="230" y2="154" class="arr" marker-end="url(#arrow)"/>
<line x1="270" y1="96"  x2="290" y2="154" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="96"  x2="350" y2="154" class="arr" marker-end="url(#arrow)"/>

<!-- Tier 2: bot core -->
<text class="tier-label" x="40" y="144">Bot core</text>

<g class="c-purple">
  <rect x="140" y="156" width="400" height="80" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="184" text-anchor="middle" dominant-baseline="central">maker_bot.py</text>
  <text class="ts" x="340" y="204" text-anchor="middle" dominant-baseline="central">Fair-value model · edge detection · maker orders</text>
  <text class="ts" x="340" y="222" text-anchor="middle" dominant-baseline="central">Balance-aware cap · fail-safe on RPC errors</text>
</g>

<!-- Side note: on-chain balance check -->
<g class="c-amber">
  <rect x="560" y="156" width="80" height="80" rx="10" stroke-width="0.5"/>
  <text class="th" x="600" y="184" text-anchor="middle" dominant-baseline="central">Polygon</text>
  <text class="ts" x="600" y="202" text-anchor="middle" dominant-baseline="central">RPC</text>
  <text class="ts" x="600" y="220" text-anchor="middle" dominant-baseline="central">USDC.e</text>
</g>
<line x1="560" y1="196" x2="540" y2="196" class="arr" marker-end="url(#arrow)"/>

<!-- Arrows down from bot to ops tier -->
<line x1="240" y1="236" x2="180" y2="294" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="236" x2="340" y2="294" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="236" x2="500" y2="294" class="arr" marker-end="url(#arrow)"/>

<!-- Tier 3: ops + interface -->
<text class="tier-label" x="40" y="284">Ops &amp; interface</text>

<g class="c-gray">
  <rect x="40" y="296" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="320" text-anchor="middle" dominant-baseline="central">cron · 2m</text>
  <text class="ts" x="110" y="338" text-anchor="middle" dominant-baseline="central">flock · logrotate</text>
</g>

<g class="c-gray">
  <rect x="200" y="296" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="320" text-anchor="middle" dominant-baseline="central">SQLite</text>
  <text class="ts" x="270" y="338" text-anchor="middle" dominant-baseline="central">alerts · positions</text>
</g>

<g class="c-purple">
  <rect x="360" y="296" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="320" text-anchor="middle" dominant-baseline="central">Webhook server</text>
  <text class="ts" x="430" y="338" text-anchor="middle" dominant-baseline="central">auth · rate limit</text>
</g>

<g class="c-amber">
  <rect x="520" y="296" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="320" text-anchor="middle" dominant-baseline="central">ngrok</text>
  <text class="ts" x="580" y="338" text-anchor="middle" dominant-baseline="central">HTTPS tunnel</text>
</g>

<line x1="500" y1="324" x2="520" y2="324" class="arr" marker-end="url(#arrow)"/>

<!-- Interface layer (bottom) -->
<line x1="430" y1="352" x2="300" y2="388" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="352" x2="430" y2="388" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
  <rect x="200" y="390" width="180" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="290" y="410" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  <text class="ts" x="290" y="428" text-anchor="middle" dominant-baseline="central">polls /feed every 2s</text>
</g>

<g class="c-purple">
  <rect x="400" y="390" width="180" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="490" y="410" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="490" y="428" text-anchor="middle" dominant-baseline="central">via GitHub MCP</text>
</g>

</svg>
